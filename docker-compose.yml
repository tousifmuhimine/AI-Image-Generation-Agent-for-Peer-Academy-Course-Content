services:
  backend:
    build:
      context: ./agent_backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./agent_backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./agent_frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AGENT_API: "http://localhost:8000"
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: unless-stopped
